services:
  - type: web
    name: janmitra-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DATABASE_PATH
        value: data/janmitra.db
      - key: UPLOAD_DIR
        value: uploads
      - key: CORS_ORIGINS
        sync: false

# NOTE: The free plan uses an ephemeral filesystem, so uploaded documents and
# chat history reset on each deploy/restart. For durable storage, upgrade to a
# paid instance, attach a disk, and point DATABASE_PATH / UPLOAD_DIR at it:
#
#   disk:
#     name: janmitra-data
#     mountPath: /var/data
#     sizeGB: 1
#   # DATABASE_PATH=/var/data/janmitra.db, UPLOAD_DIR=/var/data/uploads